# Rate Limits Configuration

# Format:
# endpoint_prefix:
#   per_ip:
#     limit: <number>
#     window: <seconds>
#   per_wallet:
#     limit: <number>
#     window: <seconds>

endpoints:
  "/api/onramp/initiate":
    per_wallet:
      limit: 5
      window: 3600

  "/api/offramp/initiate":
    per_wallet:
      limit: 5
      window: 3600

  "/api/bills/pay":
    per_wallet:
      limit: 20
      window: 3600

  "/api/wallet/balance":
    per_wallet:
      limit: 200
      window: 3600

  "/api/onramp/status":
    per_wallet:
      limit: 100
      window: 3600

  "/api/auth/verify":
    per_wallet:
      limit: 5
      window: 60

  "/api/auth/challenge":
    per_ip:
      limit: 10
      window: 60

  "/api/onramp/quote":
    per_ip:
      limit: 30
      window: 60
    per_wallet:
      limit: 10
      window: 3600
      
  "/api/offramp/quote":
    per_wallet:
      limit: 10
      window: 3600

  "/api/rates":
    per_ip:
      limit: 100
      window: 60

  "/api/fees":
    per_ip:
      limit: 100
      window: 60

  "/api/bills/providers":
    per_ip:
      limit: 50
      window: 60

# Default limits applied when no specific endpoint matches
default:
  per_ip:
    limit: 100
    window: 60
